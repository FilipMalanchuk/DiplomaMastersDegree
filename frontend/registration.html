<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/registration.css">
    <title>Registration page</title>
</head>
<body>
    <div class="wrapper">
        <div class="inner">
            <div class="registrationBox">
                <input type="text" class="name necessary" placeholder="Name" id="name">
                <input type="email" class="email necessary" placeholder="Email" id="email">
                <input type="password" class="password necessary" id="password1" placeholder="Password">
                <input type="password" class="password necessary" id="password2" placeholder="Confirm Password">
                <input type="text" class="telegram" placeholder="Telegram" id="telegram">
                <p>* marked are necessary</p>
                <p id="error"></p>
                <p class="signIn"><a href="/loginPage">Sign in</a></p>
                <div class="registrationBTN"> Register</div>
            </div>
        </div><!-- end of inner -->
    </div><!-- end of wrapper -->
    <script src="js/registration.js"></script>
</body>
</html>
