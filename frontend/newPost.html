<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/newPost.css">
    <title>New Post</title>
</head>

<body>
    <div class="wrapper">
        <div class="inner">
            <div class="header">
                <div class="btnLine">
                    <div class="searchBTN BTN"><a href="#">Search</a></div>
                    <div class="logInBTN BTN"><a href="/loginPage">Login</a></div>
                    <div class="registerBTN BTN"><a href="/registerPage">Register</a></div>
                    <a class="userProfile" style="display: none;" href="/myProfile">
                        <div class="userImage"></div>
                        <span class="userName"></span>
                        <div class="hoverInfoBox">
                            <div class="userEmail"></div>
                        </div>
                    </a>
                </div>
                <div class="menu">
                    <div class="home"><a href="/index.html">Home</a></div>
                    <div class="hashtags"><a href="#">Hashtags</a></div>
                    <div class="subscribtions"><a href="#">My Subscriptions</a></div>
                </div>
            </div> <!-- end of header -->
            <div class="logInToPost">You must be logged in to post</div>
            <div class="postBox">
                <input type="text" class="postLine postHeader" placeholder="Header">
                <textarea name="postTextarea" id="psotTextArea" class="postLine postText"
                    placeholder="Article Text"></textarea>
                <div class="tagsDiv postLine">
                    <div class="tagLine">
                        <input type="text" class="postTags" placeholder="Tag" id="postTags">
                        <div class="confirmTag tagBTN">Confirm tag</div>
                    </div>
                </div>
                <input type="file" name="postImage" id="postImage">
                <div class="postBTN">Post</div>
            </div>
        </div><!-- end of inner -->
    </div> <!-- end of wrapper -->

    <script type="module" src="js/newPost.js"></script>
</body>

</html>
