<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/login.css">
    <title>Login page</title>
</head>
<body>
   <div class="wrapper">
    <div class="inner">
        <div class="loginBox">
            <p>Email</p>
            <input type="text" id="emailForLogin">
            <br>
            <p>Password</p>
            <input type="password" id="passwordForLogin">
            <br>
            <br>
            <input type="button" value="Login" id="btnLogin">
            <br>
            <p id="errorText"></p>
        </div> <!-- end of loginBox -->
    </div> <!-- end of inner -->
   </div> <!-- end of wrapper  -->
   <script src="js/frontLogin.js"></script>
</body>
</html>
