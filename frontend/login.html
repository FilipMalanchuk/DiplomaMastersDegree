<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/login.css">
    <title>Login page</title>
</head>
<body>
   <div class="wrapper">
    <div class="inner">
        <div class="loginBox">
            <input type="text" id="emailForLogin" placeholder="Email">
            <input type="password" id="passwordForLogin" placeholder="Password">       
            <input type="button" value="Login" id="btnLogin">
            <p id="errorText"></p>
        </div> <!-- end of loginBox -->
        <div class="registerDiv">
            <a href="/registerPage" class="registerBTN">Register</a>
        </div>
    </div> <!-- end of inner -->
   </div> <!-- end of wrapper  -->
   <script type="module" src="js/frontLogin.js"></script>
</body>
</html>
